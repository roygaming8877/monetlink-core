# ==============================================================================
# MONETLINK HIGH-CONCURRENCY NGINX REVERSE PROXY ROUTER CONFIGURATION
# ==============================================================================

# Upstream Application Server Cluster (FastAPI Async Gateway Node)
upstream fastapi_cluster {
    server fastapi_app:8000 max_fails=5 fail_timeout=10s;
    keepalive 32; # Keeps persistent connection sockets open to prevent TCP handshaking lag
}

# HTTP: Global Unsecure Traffic Redirection Rule (Force Secure SSL)
server {
    listen 80;
    listen [::]:80;
    server_name monetlink.online www.monetlink.online monetlink.click monetlink.net;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: Core High-Performance Secure Production Routing Shell
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name monetlink.online www.monetlink.online monetlink.click monetlink.net;

    # Enterprise Cryptographic SSL Handshake Certificates Layout
    ssl_certificate /etc/letsencrypt/live/monetlink.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monetlink.online/privkey.pem;
    
    # Session Management and Performance Optimizations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers Protection Layer (Anti-Clickjacking & XSS Guards)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

    # Throttling & Stream Request Buffers Management
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    proxy_buffers 64 8k;
    proxy_buffer_size 16k;
    proxy_busy_buffers_size 24k;

    # Static UI Web Resource Repository Direct Cache Allocation Space
    location /static/ {
        alias /workspace/monetlink/app/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform, immutable";
        access_log off;
        log_not_found off;
    }

    # Core Redirection and Routing Interconnection Hub Setup
    location / {
        proxy_pass http://fastapi_cluster;
        proxy_http_version 1.1;
        proxy_set_header Connection ""; # Clears keep-alive tracking anomalies for persistent streaming
        
        # Enterprise Network Tracing Header Redirection Parameters
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cloudflare Anti-Fraud Proxy Trace Matrix Synchronization Layers
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header cf-ipcountry $http_cf_ipcountry;
    }

    # Error Pages Display Overlap Interceptors
    error_page 500 502 503 504 /static/html/error_500.html;
}
