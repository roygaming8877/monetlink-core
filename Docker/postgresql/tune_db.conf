# ==============================================================================
# MONETLINK POSTGRESQL HIGH-PERFORMANCE LEDGER TUNING MATRIX
# ==============================================================================

# --- Networking & Socket Connections ---
max_connections = 250                   # Keeps enough active slots for FastAPI connections pooling

# --- Memory Allocation Matrix & Caches ---
shared_buffers = 4GB                    # 25% of total system memory dedicated to active runtime caching
effective_cache_size = 12GB             # 75% of total memory space helping compiler analyze tables execution
maintenance_work_mem = 1GB              # System processes scale capacity (Indexing optimizations)
work_mem = 16MB                         # Allocates independent memory per raw sort request before disk overflow triggers

# --- Write-Ahead Log (WAL) Optimization Metrics ---
wal_buffers = 16MB                      # Dedicated trace buffer memory chunk size for sequential log transactions
checkpoint_completion_target = 0.9      # Spreads heavy disk writes safely across the completion timeline frame
checkpoint_timeout = 15min              # Prevents frequent checkpoints from bottlenecking NVMe SSD write bounds
max_wal_size = 16GB
min_wal_size = 2GB

# --- Hardware Storage System Mapping Configuration ---
random_page_cost = 1.1                  # Set to 1.1 to optimize random disk pointer reads for NVMe SSD drives
effective_io_concurrency = 200          # Allows the database to run up to 200 internal lookups simultaneously

# --- Query Planner Statistics Allocation ---
default_statistics_target = 100         # Balances speed of query planning with accuracy of execution stats

# --- Background Writer Thread Optimizations ---
bgwriter_delay = 20ms                   # Keeps background disk flushing active to prevent server stalls
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0
