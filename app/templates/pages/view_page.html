{% extends "base.html" %}
{% block title %}{{ page.title }} | MonetLink{% endblock %}

{% block content %}
<div class="bg-monet-purple/20 border-b border-purple-900/50 py-12">
    <div class="max-w-4xl mx-auto px-4 text-center">
        <h1 class="text-4xl md:text-5xl font-black text-white tracking-tight">{{ page.title }}</h1>
        <p class="text-monet-accent mt-4 font-mono text-sm">Last Updated: {{ page.updated_at.strftime('%B %d, %Y') }}</p>
    </div>
</div>

<div class="max-w-4xl mx-auto px-4 py-12">
    <div class="bg-monet-card rounded-2xl border border-slate-800 shadow-2xl p-8 md:p-12 prose prose-invert prose-purple max-w-none">
        <!-- Render sanitized HTML content straight from the DB -->
        {{ page.content | safe }}
    </div>
</div>
{% endblock %}
