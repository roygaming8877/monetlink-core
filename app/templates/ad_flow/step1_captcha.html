<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify to Continue - MonetLink</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <!-- System Popunder Injection -->
    {{ system_ads.popunder | safe if system_ads else '' }}
</head>
<body class="bg-[#f8f9fa] min-h-screen flex flex-col font-sans">
    
    <!-- Navigation Bar -->
    <nav class="bg-white border-b shadow-sm py-4 px-6 flex justify-center">
        <div class="text-xl font-black text-gray-800 tracking-wider">
            <i class="fa-solid fa-link text-blue-600"></i> MonetLink
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center p-4">
        
        {% include "components/ad_slot_header.html" %}

        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-md w-full text-center space-y-6 border border-gray-100">
            <h2 class="text-2xl font-black text-gray-800">Security Check</h2>
            <p class="text-gray-500 text-sm font-medium">Please complete the captcha below to prove you are human and proceed to your destination.</p>

            <form action="/validate/step1/{{ alias }}" method="POST" id="captchaForm" class="flex flex-col items-center gap-6 pt-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                
                <!-- Google reCAPTCHA v2 -->
                <div class="g-recaptcha" data-sitekey="{{ recaptcha_site_key }}"></div>
                
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold text-lg px-8 py-4 rounded-lg shadow-lg hover:bg-blue-700 hover:-translate-y-0.5 transition-all flex justify-center items-center gap-2">
                    Continue to Link <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>

        {% include "components/ad_slot_header.html" %}
    </main>

    <footer class="bg-white border-t py-6 text-center text-xs text-gray-400">
        <a href="/pages/terms" class="hover:text-blue-500 px-2">Terms</a> | 
        <a href="/pages/privacy" class="hover:text-blue-500 px-2">Privacy</a> | 
        <a href="/pages/abuse" class="hover:text-blue-500 px-2">Report Abuse</a>
    </footer>

</body>
</html>
