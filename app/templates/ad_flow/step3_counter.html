<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generating Link... Please Wait</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .progress-ring__circle {
            transition: stroke-dashoffset 1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
</head>
<body class="bg-[#f0f2f5] flex flex-col items-center justify-center min-h-screen p-4 font-sans">

    {% include "components/ad_slot_header.html" %}

    <div class="bg-white p-8 md:p-12 rounded-2xl shadow-2xl max-w-lg w-full text-center border border-gray-200 mt-6 mb-6">
        <h2 class="text-xl font-bold text-gray-800 mb-2">Your Destination is Ready</h2>
        <p class="text-gray-500 text-sm mb-8">Please wait while we verify the URL and generate your secure token.</p>

        <!-- SVG Circular Timer -->
        <div class="relative w-32 h-32 mx-auto mb-8">
            <svg class="w-full h-full" viewBox="0 0 120 120">
                <circle class="text-gray-200 stroke-current" stroke-width="8" cx="60" cy="60" r="50" fill="transparent"></circle>
                <circle id="progressRing" class="text-green-500 progress-ring__circle stroke-current" stroke-width="8" stroke-linecap="round" cx="60" cy="60" r="50" fill="transparent" stroke-dasharray="314" stroke-dashoffset="0"></circle>
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
                <span id="countdown" class="text-4xl font-black text-gray-800">10</span>
                <span class="text-[10px] uppercase font-bold text-gray-400">Seconds</span>
            </div>
        </div>

        <!-- Hidden Final Form -->
        <form action="/go/{{ alias }}" method="GET" id="finalForm" class="hidden">
            <button type="submit" class="w-full bg-green-500 text-white font-bold text-xl px-8 py-5 rounded-xl shadow-[0_10px_20px_rgba(34,197,94,0.3)] hover:bg-green-600 hover:-translate-y-1 transition-all flex justify-center items-center gap-3">
                <i class="fa-solid fa-unlock-keyhole"></i> Get Link Now
            </button>
        </form>

        <div id="waitMsg" class="bg-gray-100 text-gray-400 font-bold px-8 py-4 rounded-xl border border-gray-200">
            Please wait...
        </div>
    </div>

    {% include "components/ad_slot_header.html" %}

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let timeLeft = 10;
            const maxTime = 10;
            const countdownEl = document.getElementById('countdown');
            const progressRing = document.getElementById('progressRing');
            const circumference = 2 * Math.PI * 50; // 314
            
            const timerInterval = setInterval(() => {
                timeLeft--;
                countdownEl.textContent = timeLeft;
                
                const offset = circumference - (timeLeft / maxTime) * circumference;
                progressRing.style.strokeDashoffset = offset;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('waitMsg').classList.add('hidden');
                    document.getElementById('finalForm').classList.remove('hidden');
                }
            }, 1000);
        });
    </script>
</body>
</html>
