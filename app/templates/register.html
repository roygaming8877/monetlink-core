{% extends "base.html" %}
{% block title %}Create Account | MonetLink{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-lg bg-monet-card border border-purple-900/50 rounded-2xl p-8 shadow-2xl relative overflow-hidden">
        
        <!-- $1 Bonus Banner -->
        <div class="absolute top-0 inset-x-0 h-2 bg-gradient-to-r from-green-400 to-monet-accent"></div>
        <div class="bg-green-500/10 border border-green-500/30 text-green-400 text-sm font-bold p-3 rounded-lg flex items-center gap-3 mb-6">
            <i class="fa-solid fa-gift text-xl"></i> Register today and receive a $1.00 Bonus instantly!
        </div>

        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-white tracking-tight">Join MonetLink</h2>
        </div>

        <form id="registerForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                <input type="email" id="reg-email" required class="block w-full px-4 py-3 border border-purple-800 rounded-lg bg-monet-dark text-white focus:outline-none focus:ring-2 focus:ring-monet-accent">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                <input type="password" id="reg-pass" required class="block w-full px-4 py-3 border border-purple-800 rounded-lg bg-monet-dark text-white focus:outline-none focus:ring-2 focus:ring-monet-accent">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Re-enter Password</label>
                <input type="password" id="reg-pass-confirm" required class="block w-full px-4 py-3 border border-purple-800 rounded-lg bg-monet-dark text-white focus:outline-none focus:ring-2 focus:ring-monet-accent">
            </div>

            <div class="flex items-start mt-4">
                <div class="flex items-center h-5">
                    <input id="terms" type="checkbox" required class="w-4 h-4 rounded border-gray-600 bg-monet-dark text-monet-accent focus:ring-monet-accent">
                </div>
                <div class="ml-3 text-sm">
                    <label for="terms" class="text-slate-400">I agree to the <a href="/pages/terms" class="text-monet-accent hover:underline">Terms of Use</a> and <a href="/pages/privacy" class="text-monet-accent hover:underline">Privacy Policy</a>.</label>
                </div>
            </div>

            <button type="button" onclick="submitRegistration()" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-monet-dark bg-monet-accent hover:bg-yellow-400 transition-colors mt-6">
                CREATE ACCOUNT
            </button>
        </form>
        
        <p class="mt-6 text-center text-sm text-slate-400">
            Already have an account? <a href="/login" class="font-bold text-monet-accent hover:text-yellow-300">Sign in</a>
        </p>
    </div>
</div>

<script>
    async function submitRegistration() {
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-pass').value;
        const passConfirm = document.getElementById('reg-pass-confirm').value;

        if(pass !== passConfirm) {
            alert("Passwords do not match!"); return;
        }

        const res = await fetch('/api/v1/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email: email, password: pass, re_enter_password: passConfirm })
        });
        
        if(res.ok) window.location.href = '/login?registered=true';
        else { const error = await res.json(); alert(error.detail || "Registration failed."); }
    }
</script>
{% endblock %}
