{% extends "base.html" %}
{% block title %}Login to Dashboard | MonetLink{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-monet-card border border-purple-900/50 rounded-2xl p-8 shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-white tracking-tight">Welcome Back</h2>
            <p class="text-slate-400 mt-2">Sign in to manage your links and earnings</p>
        </div>

        <form action="/api/v1/auth/login" method="POST" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-envelope text-slate-500"></i>
                    </div>
                    <input type="email" name="username" id="username" required class="block w-full pl-10 pr-3 py-3 border border-purple-800 rounded-lg bg-monet-dark text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-monet-accent focus:border-transparent transition-shadow">
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between mb-2">
                    <label for="password" class="block text-sm font-medium text-slate-300">Password</label>
                    <a href="/forgot-password" class="text-xs text-monet-accent hover:text-yellow-300">Forgot Password?</a>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-slate-500"></i>
                    </div>
                    <input type="password" name="password" id="password" required class="block w-full pl-10 pr-3 py-3 border border-purple-800 rounded-lg bg-monet-dark text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-monet-accent focus:border-transparent transition-shadow">
                </div>
            </div>

            <div class="flex items-center">
                <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 rounded border-gray-600 text-monet-accent focus:ring-monet-accent bg-monet-dark">
                <label for="remember-me" class="ml-2 block text-sm text-slate-300">Remember me</label>
            </div>

            <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-monet-dark bg-monet-accent hover:bg-yellow-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-monet-accent focus:ring-offset-monet-dark transition-colors">
                SIGN IN
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-400">
            Don't have an account? 
            <a href="/register" class="font-bold text-monet-accent hover:text-yellow-300">Register Now</a>
        </p>
    </div>
</div>
{% endblock %}
