<header class="bg-monet-purple/90 backdrop-blur-md border-b border-purple-900/40 sticky top-0 z-50 shadow-xl transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
        
        <a href="/" class="flex items-center gap-2 text-3xl font-black tracking-wider text-white hover:scale-105 transition-transform">
            <i class="fa-solid fa-link text-monet-accent drop-shadow-[0_0_10px_rgba(250,204,21,0.5)]"></i> 
            Monet<span class="text-monet-accent">Link</span>
        </a>
        
        <nav class="hidden md:flex items-center gap-8 text-sm font-bold tracking-wide">
            <a href="/" class="text-slate-300 hover:text-monet-accent transition-colors duration-300">HOME</a>
            <a href="/payout-rates" class="text-slate-300 hover:text-monet-accent transition-colors duration-300">PAYOUT RATES</a>
            <a href="/payment-proof" class="text-slate-300 hover:text-monet-accent transition-colors duration-300">PAYMENT PROOF</a>
            
            {% if current_user %}
                <a href="/member/dashboard" class="bg-monet-accent text-monet-dark px-6 py-2.5 rounded-full hover:bg-yellow-300 transition-colors shadow-[0_0_15px_rgba(250,204,21,0.3)] flex items-center gap-2">
                    DASHBOARD <i class="fa-solid fa-gauge-high"></i>
                </a>
            {% else %}
                <a href="/login" class="text-slate-300 hover:text-monet-accent transition-colors duration-300">LOGIN</a>
                <a href="/register" class="bg-monet-accent text-monet-dark px-6 py-2.5 rounded-full hover:bg-yellow-300 transition-colors shadow-[0_0_15px_rgba(250,204,21,0.3)] flex items-center gap-2">
                    REGISTER <i class="fa-solid fa-user-plus"></i>
                </a>
            {% endif %}
            
            <div class="relative group cursor-pointer flex items-center text-slate-300 hover:text-monet-accent transition-colors">
                <i class="fa-solid fa-language text-lg"></i> <i class="fa-solid fa-caret-down text-xs ml-1"></i>
            </div>
        </nav>

        <button class="md:hidden text-slate-300 hover:text-white focus:outline-none" aria-label="Open Menu">
            <i class="fa-solid fa-bars text-2xl"></i>
        </button>
    </div>
</header>
