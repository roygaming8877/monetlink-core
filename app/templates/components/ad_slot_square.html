{# Reusable 300x250 Sidebar/Native Ad Slot Component #}
<div class="w-full flex justify-center my-4">
    <div class="relative w-[300px] h-[250px] bg-slate-900 border border-slate-700/50 rounded flex items-center justify-center overflow-hidden group shadow-lg mx-auto">
        <!-- Placeholder -->
        <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-600 font-mono text-xs z-0 text-center p-4">
            <i class="fa-solid fa-square-ad text-3xl mb-2 opacity-40"></i>
            <span>Sponsored Content</span>
        </div>
        
        <!-- Actual Ad Injection Zone -->
        <div class="relative z-10 w-full h-full ad-container">
            {{ system_ads.sidebar_square | safe if system_ads else '' }}
        </div>
    </div>
</div>
